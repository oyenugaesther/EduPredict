<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduPredict</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1e;
            font-family: Arial, sans-serif;
            color: #e6e8ee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 30px; font-size: 28px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e6e8ee;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover { opacity: 0.9; }
        p { text-align: center; }
        a { color: #a855f7; text-decoration: none; }
        .flash { 
            background: rgba(239, 68, 68, 0.2); 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            color: #fca5a5; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('register')}}">
            <div class="mb-3">
                 <label class="form-label">Full Name</label>
            <input type="text" name="full_name" required class="form-control form-control-nova">
            </div>
            <div class="mb-3">
                 <label class="form-label">Email</label>
            <input type="email" name="email" required class="form-control form-control-nova">
            </div>
             <div class="mb-3">
                 <label class="form-label">Password</label>
            <input type="password" name="password" required class="form-control form-control-nova">
            </div>

            <button type="submit" class="btn btn-nova w-100">Register</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</body>
</html>
