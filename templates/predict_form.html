<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Prediction - EduPredict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='nova.css') }}?v=3">
    <style>
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15) 0px, transparent 50%),
                        radial-gradient(at 80% 70%, rgba(168, 85, 247, 0.1) 0px, transparent 50%),
                        radial-gradient(at 50% 50%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
            z-index: -1;
        }
        body {
            background: #0f0f1e !important;
            color: #e6e8ee;
        }
        .card-nova {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }
        .form-control-nova, .form-select-nova {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #e6e8ee !important;
            border-radius: 12px !important;
            padding: 0.75rem 1rem !important;
        }
        .form-control-n;placeholder {
            color: rgba(230, 232, 238, 0.4) !important;
        }
        .btn-nova {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%) !important;
            color: #fff !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 0.75rem 1.5rem !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4) !important;
        }
        .form-label {
            color: #e6e8ee;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <nav class="navbar navbar-expand-lg px-4 py-3" style="background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold text-white">EduPredict</span>
            <div class="d-flex gap-2">
                <a href="{{ url_for('dashboard') }}" class="btn btn-nova-ghost">Dashboard</a>
                <a href="{{ url_for('logout') }}" class="btn btn-nova-ghost">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-nova">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px; background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); border-radius: 16px;">
                            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
                        </div>
                        <h1 class="display-6 fw-black mb-2">Student Performance Prediction</h1>
                        <p class="text-muted">Enter student data to predict final grade & risk level</p>
                    </div>
                    <form method="POST" action="{{ url_for('predict') }}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Student Full Name</label>
                                <input type="text" name="student_name" placeholder="John Doe" required class="form-control form-control-nova">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Course</label>
                                <select name="course" required class="form-select form-select-nova">
                                    <option value="" disabled selected>Select Course</option>
                                    <option>PHP</option>
                                    <option>Artificial Intelligence</option>
                                    <option>Web Content Development</option>
                                    <option>Fundamentals of Data Science</option>
                                    <option>Project</option>
                                    <option>Internship</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">First Internal Grade</label>
                                <input type="number" name="g1" placeholder="out of 20" min="0" max="20" step="0.1" required class="form-control form-control-nova">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Second Internal Grade</label>
                                <input type="number" name="g2" placeholder="out of 20" min="0" max="20" step="0.1" required class="form-control form-control-nova">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Assignment</label>
                                <input type="number" name="assignment" placeholder="out of 20" min="0" max="20" step="0.1" required class="form-control form-control-nova">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Weekly Study Hours</label>
                                <input type="number" name="study_hours" placeholder="1-16" min="1" max="16" step="1" required class="form-control form-control-nova">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Attendance</label>
                                <input type="number" name="attendance" placeholder="0 out of 100%" min="0" max="100" step="1" required class="form-control form-control-nova">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-nova w-100 mt-4"> ✨ Predict Final Grade </button>
                        <a href="{{ url_for('dashboard') }}" class="d-block text-center mt-3 text-muted" style="text-decoration: none;"> ← Back to dashboard </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
