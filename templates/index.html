<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EduPredict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='nova.css') }}?v=3">
    <style>
        .mesh-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: 
                radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15) 0px, transparent 50%), 
                radial-gradient(at 80% 70%, rgba(168, 85, 247, 0.1) 0px, transparent 50%), 
                radial-gradient(at 50% 50%, rgba(139, 92, 246, 0.08) 0px, transparent 50%); 
            z-index: -1; 
        } 
        body { 
            background: #0f0f1e !important; 
            color: #e6e8ee; 
            font-family: 'Inter', sans-serif; 
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="hero-wrap">
        <div class="hero-grid">
            <div class="hero-text">
                <h1>
                    <span>Predict.</span>
                    <span>Analyze.</span>
                    <span>Excel.</span>
                </h1>
                <p>
                    EduPredict is the intelligent platform that helps educators identify at-risk students and drive better academic outcomes with AI.
                </p>
            </div>
            <div>
                <div class="card-nova">
                    <h2>Get Started</h2>
                    <p class="text-muted mb-4">Access your teacher dashboard</p>
                    <div class="d-grid gap-3">
                        <a href="{{ url_for('login') }}" 
                           style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%) !important; color: #fff !important; border-radius: 12px; padding: 0.75rem 1.5rem; font-weight: 600; text-decoration: none !important; display: block; text-align: center; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); width: 100%;">
                            Login →
                        </a>
                        <a href="{{ url_for('register') }}" 
                           style="background: rgba(255, 255, 255, 0.1) !important; color: #e6e8ee !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; border-radius: 12px; padding: 0.75rem 1.5rem; font-weight: 600; text-decoration: none !important; display: block; text-align: center; width: 100%;">
                            Create Account
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
