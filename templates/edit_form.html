<!DOCTYPE html>
<html>
<head>
    <title>Edit Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='nova.css') }}?v=3">
    <style>
        .mesh-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: 
                radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15) 0px, transparent 50%), 
                radial-gradient(at 80% 70%, rgba(168, 85, 247, 0.1) 0px, transparent 50%), 
                radial-gradient(at 50% 50%, rgba(139, 92, 246, 0.08) 0px, transparent 50%); 
            z-index: -1; 
        } 
        body { 
            background: #0f0f1e !important; 
            color: #e6e8ee; 
            font-family: 'Inter', sans-serif; 
        }
        .card-nova {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="container py-4">
        <div class="card-nova">
            <h2 class="fw-bold mb-4">Edit Prediction for {{ p.student_name }}</h2>
                <form method="POST" action="{{ url_for('edit_prediction', id=p['id']) }}">
                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" name="student_name" value="{{ p.student_name }}" required 
                           class="form-control form-control-nova">
                </div>
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select name="course" class="form-select form-select-nova" required>
                        <option value="PHP" {% if p.course == 'PHP' %}selected{% endif %}>PHP</option>
                        <option value="Artificial Intelligence" {% if p.course == 'Artificial Intelligence' %}selected{% endif %}>Artificial Intelligence</option>
                        <option value="Web Content Management" {% if p.course == 'Web Content Management' %}selected{% endif %}>Web Content Management</option>
                        <option value="Fundamentals of Data Science" {% if p.course == 'Fundamentals of Data Science' %}selected{% endif %}>Fundamentals of Data Science</option>
                    </select>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">G1</label>
                        <input type="number" step="0.1" name="g1" value="{{ p.g1 }}" required 
                               class="form-control form-control-nova">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">G2</label>
                        <input type="number" step="0.1" name="g2" value="{{ p.g2 }}" required 
                               class="form-control form-control-nova">
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Assignment</label>
                        <input type="number" step="0.1" name="assignment" value="{{ p.assignment }}" required 
                               class="form-control form-control-nova">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Attendance (%)</label>
                        <input type="number" step="0.1" name="attendance" value="{{ p.attendance }}" required 
                               class="form-control form-control-nova">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Study Hours</label>
                    <input type="number" step="0.1" name="study_hours" value="{{ p.study_hours }}" required 
                           class="form-control form-control-nova">
                </div>
                <button type="submit" class="btn btn-nova w-100">
                    Update Prediction
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-nova-ghost w-100 mt-2">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</body>
</html>
